<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>หน้าแรก</title>
    <link rel="stylesheet" href="styles_index.css">
</head>
<body>

<div class="box">
    <h2>รักเค้ามั้ยย 💖🥺</h2>

    <button onclick="goPage()">รักมากก 🫶</button>
    <button id="runaway">ไม่รัก 😡</button>
</div>

<script>
    function goPage() {
        window.location.href = "page2.html";
    }

    const btn = document.getElementById("runaway");

    btn.addEventListener("mouseover", () => {
        const x = Math.random() * (window.innerWidth - 100);
        const y = Math.random() * (window.innerHeight - 50);

        btn.style.left = x + "px";
        btn.style.top = y + "px";
    });
</script>

</body>
</html>
