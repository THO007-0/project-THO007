<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>หน้าแรก</title>
    <link rel="stylesheet" href="styles_index.css">
</head>
<body>

<div class="box">
    <h2>แฟนรักเค้ามั้ยย 💖🥺</h2>

    <button onclick="goPage()">รัก 🫶</button>
    <button id="runaway">ไม่รัก 😡</button>
</div>

<audio id="sound" src="https://www.myinstants.com/media/sounds/cartoon-jump.mp3"></audio>

<script>
    function goPage() {
        showHearts();
        setTimeout(() => {
            window.location.href = "page2.html";
        }, 1500);
    }

    const btn = document.getElementById("runaway");
    const sound = document.getElementById("sound");

    // วิ่งหนีแบบโกง
    btn.addEventListener("mouseover", () => {
        moveButton();
        sound.play();
    });

    btn.addEventListener("click", () => {
        moveButton(); // กดก็หนี 😈
    });

    function moveButton() {
        const x = Math.random() * (window.innerWidth - 120);
        const y = Math.random() * (window.innerHeight - 60);

        btn.style.left = x + "px";
        btn.style.top = y + "px";
    }

    // สร้างหัวใจลอย
    function showHearts() {
        for (let i = 0; i < 20; i++) {
            const heart = document.createElement("div");
            heart.innerHTML = "💖";
            heart.className = "heart";

            heart.style.left = Math.random() * 100 + "vw";
            heart.style.animationDuration = (Math.random() * 2 + 2) + "s";

            document.body.appendChild(heart);

            setTimeout(() => {
                heart.remove();
            }, 3000);
        }
    }
</script>

</body>
</html>
