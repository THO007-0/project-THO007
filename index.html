<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>หน้าแรก</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: #111;
            color: white;
            font-family: sans-serif;
        }

        .box {
            text-align: center;
        }

        input {
            display: block;
            margin: 15px auto;
            padding: 10px;
            font-size: 16px;
        }

        button {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
        }

        #runaway {
            position: absolute;
        }
    </style>
</head>
<body>

<div class="box">
    <h2>รักเค้ามั้ยย</h2>

    <!-- ช่องที่ 1 -->
    <button onclick="goPage()">รักมากก</button>

    <!-- ช่องที่ 2 -->
    <button id="runaway">ไม่รัก</button>
</div>

<script>
    function goPage() {
        window.location.href = "page2.html";
    }

    const btn = document.getElementById("runaway");

    btn.addEventListener("mouseover", () => {
        const x = Math.random() * (window.innerWidth - 100);
        const y = Math.random() * (window.innerHeight - 50);

        btn.style.left = x + "px";
        btn.style.top = y + "px";
    });
</script>

</body>
</html>
